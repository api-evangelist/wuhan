aid: wuhan
name: Wuhan University
description: >-
  Wuhan University (WHU), founded in 1893 and located in Wuhan, Hubei, China, is
  one of China's oldest and most prestigious comprehensive research universities,
  ranked #194 in the QS World University Rankings 2025. It operates under the
  Ministry of Education of China and is recognized for surveying and remote
  sensing, geoinformatics, and the sciences. WHU does not publish a centralized,
  publicly documented developer or API portal; its official web presence
  (en.whu.edu.cn) is informational only. Discoverable developer activity is
  concentrated in research-group GitHub organizations rather than institutional
  API products. No public, documented institutional API endpoints could be
  confirmed at the time of review.
